name: Validate Skill Index

on:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'scripts/**'
  pull_request:
    branches: [master]
    paths:
      - 'skills/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run scan.js
        run: node scripts/scan.js

      - name: Check if index files need update
        id: check_changes
        run: |
          if git diff --quiet skills/INDEX.md skills/skills.json _redirects; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-fix and commit index files (push only)
        if: github.event_name == 'push' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add skills/INDEX.md skills/skills.json _redirects
          git commit -m "chore: auto-update skill index files"
          git push

      - name: Fail if index files out of date (PR only)
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.changed == 'true'
        run: |
          echo "❌ Index files are out of date. Run 'node scripts/scan.js' and commit the changes."
          git diff skills/INDEX.md skills/skills.json _redirects
          exit 1

      - name: ✅ Index files are up to date
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ All index files are up to date"
