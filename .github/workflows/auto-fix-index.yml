name: Auto Fix Skill Index

on:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run scan.js
        run: node scripts/scan.js

      - name: Check if index files changed
        id: check_changes
        run: |
          if git diff --quiet skills/INDEX.md skills/skills.json _redirects; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add skills/INDEX.md skills/skills.json _redirects
          git commit -m "chore: auto-update skill index files"
          git pull --rebase origin master
          git push

      - name: Purge jsDelivr CDN cache
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/bigmanBass666/jason-skill-hub@master/skills/INDEX.md" || true
          curl -s "https://purge.jsdelivr.net/gh/bigmanBass666/jason-skill-hub@master/skills/skills.json" || true
