[build]
  publish = "skills"
  command = "node scripts/scan.js"

[build.environment]
  NODE_VERSION = "18"

# Headers for raw text content
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
    Access-Control-Allow-Origin = "*"
